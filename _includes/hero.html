{% assign t = site.data.i18n[page.lang] %}

<section class="relative pt-16 sm:pt-36 overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-br from-primary-950 via-primary-900 to-primary-800"></div>
  <div class="absolute inset-0 hero-pattern"></div>
  <div class="absolute inset-0 opacity-8">
    <img src="https://images.unsplash.com/photo-1579684385127-1ef15d508118?w=1920&q=80&auto=format&fit=crop"
         alt="" class="w-full h-full object-cover" loading="eager">
  </div>

  <div class="relative max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-20 sm:py-28 lg:py-36">
    <div class="max-w-3xl">
      <div class="w-12 h-0.5 bg-accent-400 mb-6"></div>
      <p class="text-accent-300 text-sm font-semibold tracking-widest uppercase mb-4">Oftalmologia</p>
      <h1 class="font-display text-4xl sm:text-5xl lg:text-6xl font-bold text-white leading-tight">
        {{ t.hero_title }}
      </h1>
      <p class="mt-3 text-lg sm:text-xl text-primary-200 font-medium">
        {{ t.hero_subtitle }}
      </p>
      <p class="mt-6 text-base sm:text-lg text-primary-100/70 leading-relaxed max-w-2xl">
        {{ t.hero_description }}
      </p>
      <div class="mt-10 flex flex-wrap gap-4">
        <a href="#clinics" class="inline-flex items-center px-7 py-3.5 bg-white text-primary-900 font-semibold text-sm rounded-lg hover:bg-primary-50 transition-all duration-300 shadow-lg hover:shadow-xl">
          {{ t.hero_cta }}
          <svg class="ml-2 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </a>
        <a href="#surgery" class="inline-flex items-center px-7 py-3.5 border border-primary-400/30 text-primary-100 font-medium text-sm rounded-lg hover:bg-white/10 transition-all duration-300">
          {{ t.hero_surgery_cta }}
        </a>
      </div>
    </div>
  </div>

  <!-- Wave separator -->
  <div class="relative">
    <svg class="w-full h-12 sm:h-16" viewBox="0 0 1440 60" preserveAspectRatio="none" fill="white">
      <path d="M0,60 L0,20 Q360,0 720,20 Q1080,40 1440,20 L1440,60 Z"/>
    </svg>
  </div>
</section>
