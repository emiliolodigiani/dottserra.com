  about_title: "Dr. Umberto Serra"
  about_p1: >
    Le Dr. Umberto Serra est <strong>Médecin Chirurgien Spécialiste en Ophtalmologie</strong>.
    Diplômé en Médecine et Chirurgie de l'<strong>Université de Pavie</strong> en 2003,
    il a obtenu sa Spécialisation en Ophtalmologie dans la même université en 2008,
    ainsi que le Diplôme de l'<strong>European Board of Ophthalmology</strong> à Paris la même année.
  about_p2: >
    En 2016, il a complété le <strong>Diplôme Interuniversitaire en Pathologie Rétinienne</strong>
    aux Universités de Paris, Dijon et Bordeaux, et en 2018 il a effectué un
    fellowship en <strong>Chirurgie Vitréo-Rétinienne</strong> au <strong>Roski Eye Institute</strong>
    de l'University of Southern California à Los Angeles.
  about_p3: >
    De 2010 à 2024, il a exercé en tant que Médecin Hospitalier dans des structures
    hospitalières piémontaises, dont l'<strong>Hôpital Ophtalmique de Turin</strong> à partir de 2013.
    Il a réalisé plus de <strong>6 000 interventions chirurgicales</strong>. Depuis 2013, il collabore
    avec les <strong>Médecins Volontaires Italiens</strong>, participant à des missions humanitaires
    à Madagascar et en Libye.
  about_education_title: "Formation"
  about_education:
    - "Diplôme de Médecine et Chirurgie — Université de Pavie (2003)"
    - "Spécialisation en Ophtalmologie — Université de Pavie (2008)"
    - "European Board of Ophthalmology — Paris (2008)"
    - "Diplôme en Pathologie Rétinienne — Universités de Paris-Dijon-Bordeaux (2016)"
    - "Fellowship Chirurgie Vitréo-Rétinienne — Roski Eye Institute, USC Los Angeles (2018)"
  about_languages_title: "Le docteur consulte en"
  about_languages:
    - "Italien"
    - "Anglais"
    - "Français"
