      type: "oral"
    - authors: "Serra U, Arnone R, Vandelli G, Ruberto G"
      title: "20G and 25G Macular Surgery: Anatomic and Functional Results"
      venue: "Congresso ARVO, Fort Lauderdale, USA"
      year: "2008"
      journal: ""
      type: "poster"
    - authors: "Serra U, Julián K, Aknin C, Cassoux N, Fardeau C, Paris L, LeHoang P, Bodaghi B"
      title: "Ocular Toxoplasmosis Recurrences: A Single Center Experience"
      venue: "Congresso ARVO, Fort Lauderdale, USA"
      year: "2010"
      journal: ""
      type: "poster"
  research_type_poster: "Poster"
  research_type_oral: "Presentazione orale"
  research_humanitarian_title: "Attività Umanitaria"
  research_humanitarian_text: >
    Dal 2013 il Dott. Serra collabora con i Medici Volontari Italiani (MVI),
    partecipando a missioni chirurgiche umanitarie in Madagascar e Libia,
    portando competenze oftalmologiche avanzate in contesti con accesso limitato alle cure oculistiche.

