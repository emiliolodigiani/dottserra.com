  hero_title: "Dott. Umberto Serra"
  hero_subtitle: "Medico Chirurgo Specialista in Oftalmologia"
  hero_description: "Chirurgia vitreo-retinica, chirurgia della cataratta e trattamento delle patologie oculari. Oltre 6.000 interventi eseguiti con tecniche microchirurgiche di ultima generazione."
  hero_cta: "Prenota una visita"
  hero_surgery_cta: "Attività Chirurgica"

  about_title: "Dott. Umberto Serra"
  about_p1: >
    Il Dott. Umberto Serra è <strong>Medico Chirurgo Specialista in Oftalmologia</strong>.
    Laureato in Medicina e Chirurgia presso l'<strong>Università degli Studi di Pavia</strong> nel 2003,
    ha conseguito la Specializzazione in Oftalmologia presso lo stesso ateneo nel 2008,
    ottenendo nello stesso anno il Diploma dell'<strong>European Board of Ophthalmology</strong> a Parigi.
  about_p2: >
    Nel 2016 ha completato il <strong>Diploma Interuniversitario in Patologia Retinica</strong>
    presso le Università di Parigi, Digione e Bordeaux, e nel 2018 ha svolto un
    fellowship in <strong>Chirurgia Vitreo-Retinica</strong> presso il <strong>Roski Eye Institute</strong>
    dell'University of Southern California a Los Angeles.
  about_p3: >
    Dal 2010 al 2024 ha ricoperto il ruolo di Dirigente Medico presso strutture
    ospedaliere piemontesi, tra cui l'<strong>Ospedale Oftalmico di Torino</strong> dal 2013.
    Ha eseguito oltre <strong>6.000 interventi chirurgici</strong>. Dal 2013 collabora con i
    <strong>Medici Volontari Italiani</strong>, partecipando a missioni umanitarie in Madagascar e Libia.
  about_education_title: "Formazione"
  about_education:
    - "Laurea in Medicina e Chirurgia — Università di Pavia (2003)"
    - "Specializzazione in Oftalmologia — Università di Pavia (2008)"
    - "European Board of Ophthalmology — Parigi (2008)"
    - "Diploma in Patologia Retinica — Università di Parigi-Digione-Bordeaux (2016)"
    - "Fellowship Chirurgia Vitreo-Retinica — Roski Eye Institute, USC Los Angeles (2018)"
  about_languages_title: "Il dottore visita in"
  about_languages:
    - "Italiano"
    - "Inglese"
    - "Francese"
    - "Portoghese"

  services_title: "Visite Specialistiche"
  services_subtitle: "L'attività ambulatoriale comprende visite oculistiche complete e approfondimenti diagnostici mirati."
  services:
    - title: "Visita Oculistica Completa"
      description: "Valutazione approfondita della funzione visiva, esame del segmento anteriore e del fondo oculare, misurazione della pressione intraoculare e della refrazione."
      icon: "eye"
    - title: "Diagnostica Strumentale"
      description: "OCT della retina e del nervo ottico, campo visivo computerizzato, topografia corneale, pachimetria e biometria oculare per un inquadramento diagnostico completo."
      icon: "scan"
    - title: "Patologie della Retina"
      description: "Diagnosi e monitoraggio delle maculopatie, della retinopatia diabetica, delle occlusioni vascolari retiniche e delle degenerazioni retiniche periferiche."
      icon: "retina"
    - title: "Glaucoma"
      description: "Screening, diagnosi e follow-up del glaucoma con tonometria, pachimetria, OCT delle fibre nervose e campo visivo. Definizione della terapia medica o indicazione chirurgica."
      icon: "pressure"
    - title: "Cataratta"
      description: "Valutazione pre-operatoria completa, calcolo della lente intraoculare con biometria di ultima generazione e pianificazione dell'intervento chirurgico."
      icon: "lens"
    - title: "Oftalmologia Pediatrica"
      description: "Screening visivo in età pediatrica, valutazione dello strabismo, dell'ambliopia e dei difetti refrattivi nel bambino."
      icon: "child"

  surgery_title: "Attività Chirurgica"
  surgery_subtitle: "Oltre 6.000 interventi eseguiti con tecniche microchirurgiche di ultima generazione."
  surgery_intro: >
    L'attività chirurgica del Dott. Serra si concentra sulla chirurgia dell'occhio interno,
    con particolare competenza nella chirurgia vitreo-retinica e nella chirurgia della cataratta.
    La formazione internazionale — dal Roski Eye Institute di Los Angeles alle università francesi —
    garantisce un approccio aggiornato alle tecniche più avanzate. Ogni intervento viene pianificato
    in modo accurato sulla base delle caratteristiche individuali del paziente.
  surgery_procedures_title: "Principali interventi"
  surgery_procedures:
    - title: "Chirurgia Vitreo-Retinica"
      description: "Vitrectomia per il trattamento del distacco di retina, della membrana epiretinica (pucker maculare), del foro maculare, delle complicanze della retinopatia diabetica e delle emorragie vitreali."
    - title: "Chirurgia della Cataratta"
      description: "Facoemulsificazione con impianto di lente intraoculare, incluse lenti toriche per la correzione dell'astigmatismo e lenti multifocali per la presbiopia. Gestione delle cataratte complicate."
    - title: "Chirurgia Refrattiva"
      description: "Correzione dei difetti visivi (miopia, ipermetropia, astigmatismo, presbiopia) mediante laser ad eccimeri, femtolaser e impianto di lenti intraoculari per difetti refrattivi elevati."
    - title: "Iniezioni Intravitreali"
      description: "Somministrazione intravitreale di farmaci anti-VEGF e corticosteroidi per il trattamento della degenerazione maculare senile, dell'edema maculare diabetico e delle occlusioni venose retiniche."
    - title: "Chirurgia del Glaucoma"
      description: "Interventi filtranti e impianti drenanti per il controllo della pressione intraoculare nelle forme di glaucoma non controllate dalla terapia medica."
    - title: "Trattamenti Laser"
      description: "Fotocoagulazione laser argon per rotture retiniche e retinopatia diabetica. Laser YAG per capsulotomia posteriore e iridotomia. Laser selettivo (SLT) per il glaucoma."

  research_title: "Pubblicazioni e Ricerca"
  research_subtitle: "Attività scientifica presentata a congressi internazionali e pubblicata su riviste peer-reviewed."
  research_publications:
    - authors: "Milano G, Serra U, Maceri C, Tiso C, Scatassi I"
      title: "Morphometric parameters of laser scanning tomograph (HRT-II) and scanning laser polarimetry (GDx-VCC) to discriminate between normal and glaucomatous eyes"
      venue: "Congresso EVER, Vilamoura, Portogallo"
      year: "2005"
      journal: "Ophthalmic Research 2005; Vol. 37, Suppl. 1"
      type: "poster"
    - authors: "Milano G, Maceri C, Bordin M, Serra U, Tiso C"
      title: "Automated perimetry and laser polarimetry in the assessment of nerve fibers involvement in pituitary adenoma"
      venue: "Congresso EVER, Vilamoura"
      year: "2006"
      journal: "Acta Ophthalmologica 2006; Vol. 84, Suppl. 239"
      type: "oral"
    - authors: "Milano G, Bossolesi L, Maceri C, Colombo M, Bordin M, Serra U"
      title: "SITA-SWAP in glaucoma diagnosis"
      venue: "Congresso EVER, Portoroz, Slovenia"
      year: "2007"
