  services_title: "Consultations Spécialisées"
  services_subtitle: "L'activité ambulatoire comprend des consultations ophtalmologiques complètes et des examens diagnostiques ciblés."
  services:
    - title: "Consultation Ophtalmologique Complète"
      description: "Évaluation approfondie de la fonction visuelle, examen du segment antérieur et du fond d'œil, mesure de la pression intraoculaire et de la réfraction."
      icon: "eye"
    - title: "Diagnostic Instrumental"
      description: "OCT de la rétine et du nerf optique, champ visuel informatisé, topographie cornéenne, pachymétrie et biométrie oculaire pour un bilan diagnostique complet."
      icon: "scan"
    - title: "Pathologies de la Rétine"
      description: "Diagnostic et suivi des maculopathies, de la rétinopathie diabétique, des occlusions vasculaires rétiniennes et des dégénérescences rétiniennes périphériques."
      icon: "retina"
    - title: "Glaucome"
      description: "Dépistage, diagnostic et suivi du glaucome par tonométrie, pachymétrie, OCT des fibres nerveuses et champ visuel. Définition du traitement médical ou indication chirurgicale."
      icon: "pressure"
    - title: "Cataracte"
      description: "Bilan pré-opératoire complet, calcul de l'implant intraoculaire par biométrie de dernière génération et planification de l'intervention chirurgicale."
      icon: "lens"
    - title: "Ophtalmologie Pédiatrique"
      description: "Dépistage visuel en âge pédiatrique, évaluation du strabisme, de l'amblyopie et des défauts réfractifs chez l'enfant."
      icon: "child"

  surgery_title: "Activité Chirurgicale"
  surgery_subtitle: "Plus de 6 000 interventions réalisées avec des techniques microchirurgicales de dernière génération."
  surgery_intro: >
    L'activité chirurgicale du Dr. Serra se concentre sur la chirurgie de l'œil interne,
    avec une compétence particulière en chirurgie vitréo-rétinienne et en chirurgie de la
    cataracte. La formation internationale — du Roski Eye Institute de Los Angeles aux
    universités françaises — garantit une approche actualisée aux techniques les plus avancées.
    Chaque intervention est planifiée de manière rigoureuse en fonction des caractéristiques
    individuelles du patient.
  surgery_procedures_title: "Principales interventions"
  surgery_procedures:
    - title: "Chirurgie Vitréo-Rétinienne"
      description: "Vitrectomie pour le traitement du décollement de rétine, de la membrane épirétinienne (pucker maculaire), du trou maculaire, des complications de la rétinopathie diabétique et des hémorragies du vitré."
    - title: "Chirurgie de la Cataracte"
      description: "Phacoémulsification avec implantation de lentille intraoculaire, y compris lentilles toriques pour la correction de l'astigmatisme et lentilles multifocales pour la presbytie. Gestion des cataractes compliquées."
    - title: "Chirurgie Réfractive"
      description: "Correction des défauts visuels (myopie, hypermétropie, astigmatisme, presbytie) par laser excimer, femtolaser et implantation de lentilles intraoculaires pour les défauts réfractifs élevés."
    - title: "Injections Intravitréennes"
      description: "Administration intravitréenne de médicaments anti-VEGF et corticostéroïdes pour le traitement de la dégénérescence maculaire liée à l'âge, de l'œdème maculaire diabétique et des occlusions veineuses rétiniennes."
    - title: "Chirurgie du Glaucome"
      description: "Interventions filtrantes et implants de drainage pour le contrôle de la pression intraoculaire dans les formes de glaucome non contrôlées par le traitement médical."
    - title: "Traitements Laser"
      description: "Photocoagulation laser argon pour déchirures rétiniennes et rétinopathie diabétique. Laser YAG pour capsulotomie postérieure et iridotomie. Laser sélectif (SLT) pour le glaucome."

