<!DOCTYPE html>
<html lang="{{ page.lang | default: 'it' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.data.i18n[page.lang].site_title }} — {{ site.data.i18n[page.lang].site_subtitle }}</title>
  <meta name="description" content="{{ site.data.i18n[page.lang].hero_description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .font-body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
  {% seo %}
</head>
<body class="font-body bg-white text-gray-700 antialiased">
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}

  <script>
    // Fade-in on scroll
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(function(el) {
      observer.observe(el);
    });
  </script>
</body>
</html>
